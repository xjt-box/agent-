<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent E-Commerce</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe3ee;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
      --blue: #2563eb;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .app {
      max-width: 1360px;
      margin: 0 auto;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 13px;
      background: #fff;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 18px 18px 0;
    }

    .panel-title {
      margin: 0;
      font-size: 17px;
    }

    .panel-desc {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .form {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      padding: 12px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(15, 118, 110, .55);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, .10);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .preset {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      padding: 8px 11px;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      padding-top: 4px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 15px;
      cursor: pointer;
      font-size: 14px;
      transition: transform .12s ease, opacity .12s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { cursor: not-allowed; opacity: .65; transform: none; }

    .primary {
      background: linear-gradient(135deg, var(--accent), #0ea5a6);
      color: #fff;
      box-shadow: 0 10px 22px rgba(15, 118, 110, .2);
    }

    .secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 7px;
      font-size: 22px;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
      align-items: center;
    }

    .section-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .section-body {
      padding: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .card-title {
      margin: 0;
      font-weight: 700;
      font-size: 15px;
    }

    .meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef6ff;
      color: var(--blue);
      font-size: 12px;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .agent-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .status {
      border-radius: 999px;
      padding: 5px 9px;
      background: #ecfdf3;
      color: var(--green);
      font-size: 12px;
    }

    .status.fail {
      background: #fef2f2;
      color: var(--red);
    }

    .empty, .log {
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fcfdff;
      color: var(--muted);
      padding: 15px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .metrics, .cards, .agent-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .app { padding: 16px; }
      .topbar { flex-direction: column; }
      .chips { justify-content: flex-start; }
      .metrics, .cards, .agent-grid, .grid-2 { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1 class="title" id="pageTitle"></h1>
        <p class="subtitle" id="pageSubtitle"></p>
      </div>
      <div class="chips">
        <div class="chip"><span class="dot"></span><span id="healthText"></span></div>
        <div class="chip"><span id="modelLabel"></span><strong id="modelText">-</strong></div>
        <div class="chip"><span id="apiLabel"></span><strong>/api/v1/recommend</strong></div>
      </div>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title" id="configTitle"></h2>
          <p class="panel-desc" id="configDesc"></p>
        </div>
        <div class="form">
          <div class="field">
            <label id="labelUser"></label>
            <input id="userId" />
          </div>
          <div class="grid-2">
            <div class="field">
              <label id="labelScene"></label>
              <select id="scene"></select>
            </div>
            <div class="field">
              <label id="labelCount"></label>
              <input id="numItems" type="number" min="1" max="10" />
            </div>
          </div>
          <div class="field">
            <label id="labelViews"></label>
            <textarea id="recentViews"></textarea>
          </div>
          <div class="field">
            <label id="labelPurchases"></label>
            <textarea id="recentPurchases"></textarea>
          </div>
          <div class="grid-2">
            <div class="field">
              <label id="labelViewCount"></label>
              <input id="viewCount" type="number" />
            </div>
            <div class="field">
              <label id="labelPurchaseCount"></label>
              <input id="purchaseCount" type="number" />
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label id="labelAvgOrder"></label>
              <input id="avgOrder" type="number" />
            </div>
            <div class="field">
              <label id="labelHours"></label>
              <input id="activeHours" />
            </div>
          </div>
          <div class="field">
            <label id="labelPresets"></label>
            <div class="presets" id="presets"></div>
          </div>
          <div class="actions">
            <button class="btn primary" id="runBtn"></button>
            <button class="btn secondary" id="resetBtn"></button>
          </div>
        </div>
      </section>

      <section class="content">
        <section class="panel">
          <div class="metrics">
            <div class="metric"><div class="metric-label" id="metricLatency"></div><div class="metric-value" id="latencyValue">-</div></div>
            <div class="metric"><div class="metric-label" id="metricProducts"></div><div class="metric-value" id="productCount">-</div></div>
            <div class="metric"><div class="metric-label" id="metricCopies"></div><div class="metric-value" id="copyCount">-</div></div>
            <div class="metric"><div class="metric-label" id="metricGroup"></div><div class="metric-value" id="groupValue">-</div></div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head"><h2 id="productsTitle"></h2><span id="productsHint"></span></div>
          <div class="section-body" id="productsWrap"></div>
        </section>

        <section class="panel">
          <div class="section-head"><h2 id="copiesTitle"></h2><span id="copiesHint"></span></div>
          <div class="section-body" id="copiesWrap"></div>
        </section>

        <section class="panel">
          <div class="section-head"><h2 id="agentsTitle"></h2><span id="agentsHint"></span></div>
          <div class="section-body"><div class="agent-grid" id="agentsWrap"></div></div>
        </section>

        <section class="panel">
          <div class="section-head"><h2 id="logTitle"></h2><span id="logHint"></span></div>
          <div class="section-body"><div class="log" id="logBox"></div></div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const cn = {
      pageTitle: "\u591a\u667a\u80fd\u4f53\u7535\u5546\u63a8\u8350\u7cfb\u7edf",
      pageSubtitle: "\u8f93\u5165\u7528\u6237\u884c\u4e3a\uff0c\u4e00\u952e\u751f\u6210\u7528\u6237\u753b\u50cf\u3001\u5546\u54c1\u63a8\u8350\u548c\u8425\u9500\u6587\u6848\u3002",
      serviceOnline: "\u670d\u52a1\u5728\u7ebf",
      serviceOffline: "\u670d\u52a1\u79bb\u7ebf",
      model: "\u6a21\u578b\uff1a",
      api: "\u63a5\u53e3\uff1a",
      configTitle: "\u63a8\u8350\u914d\u7f6e",
      configDesc: "\u9009\u62e9\u573a\u666f\u5e76\u586b\u5199\u7528\u6237\u884c\u4e3a\uff0c\u53f3\u4fa7\u4f1a\u5c55\u793a\u63a8\u8350\u7ed3\u679c\u548c Agent \u8fd0\u884c\u72b6\u6001\u3002",
      labelUser: "\u7528\u6237 ID",
      labelScene: "\u573a\u666f",
      labelCount: "\u63a8\u8350\u6570\u91cf",
      labelViews: "\u6700\u8fd1\u6d4f\u89c8",
      labelPurchases: "\u6700\u8fd1\u8d2d\u4e70",
      labelViewCount: "7 \u65e5\u6d4f\u89c8\u6b21\u6570",
      labelPurchaseCount: "30 \u65e5\u8d2d\u4e70\u6b21\u6570",
      labelAvgOrder: "\u5ba2\u5355\u4ef7",
      labelHours: "\u6d3b\u8dc3\u65f6\u6bb5",
      labelPresets: "\u5feb\u6377\u793a\u4f8b",
      run: "\u751f\u6210\u63a8\u8350",
      running: "\u751f\u6210\u4e2d...",
      reset: "\u6062\u590d\u793a\u4f8b",
      metricLatency: "\u603b\u8017\u65f6\uff08ms\uff09",
      metricProducts: "\u63a8\u8350\u5546\u54c1",
      metricCopies: "\u8425\u9500\u6587\u6848",
      metricGroup: "\u5b9e\u9a8c\u5206\u7ec4",
      productsTitle: "\u63a8\u8350\u7ed3\u679c",
      productsHint: "\u5546\u54c1\u5361\u7247\u4f18\u5148\u5c55\u793a\u4ef7\u683c\u3001\u7c7b\u76ee\u548c\u5e93\u5b58",
      copiesTitle: "\u8425\u9500\u6587\u6848",
      copiesHint: "\u53ef\u76f4\u63a5\u590d\u7528\u5230\u8fd0\u8425\u573a\u666f",
      agentsTitle: "Agent \u72b6\u6001",
      agentsHint: "\u5feb\u901f\u5224\u65ad\u5404\u73af\u8282\u662f\u5426\u6210\u529f",
      logTitle: "\u8bf7\u6c42\u65e5\u5fd7",
      logHint: "\u4fbf\u4e8e\u5b9a\u4f4d\u63a5\u53e3\u8fd4\u56de\u548c\u9519\u8bef",
      emptyProducts: "\u70b9\u51fb\u201c\u751f\u6210\u63a8\u8350\u201d\u540e\uff0c\u8fd9\u91cc\u4f1a\u663e\u793a\u5546\u54c1\u5361\u7247\u3002",
      emptyCopies: "\u70b9\u51fb\u201c\u751f\u6210\u63a8\u8350\u201d\u540e\uff0c\u8fd9\u91cc\u4f1a\u663e\u793a\u8425\u9500\u6587\u6848\u3002",
      emptyAgents: "\u70b9\u51fb\u201c\u751f\u6210\u63a8\u8350\u201d\u540e\uff0c\u8fd9\u91cc\u4f1a\u663e\u793a\u5404 Agent \u72b6\u6001\u3002",
      emptyLog: "\u7b49\u5f85\u53d1\u8d77\u8bf7\u6c42\u3002",
      success: "\u6210\u529f",
      failed: "\u5931\u8d25",
      normal: "\u72b6\u6001\uff1a\u6b63\u5e38",
      error: "\u9519\u8bef\uff1a",
      latency: "\u8017\u65f6\uff1a",
      confidence: "\u7f6e\u4fe1\u5ea6\uff1a",
      stock: "\u5e93\u5b58",
      category: "\u7c7b\u76ee",
      brand: "\u54c1\u724c",
      productId: "\u5546\u54c1 ID",
      noData: "\u6682\u65e0\u6570\u636e",
      requestFailed: "\u8bf7\u6c42\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u540e\u7aef\u670d\u52a1\u6216\u6a21\u578b\u914d\u7f6e\u3002",
      scenes: [["homepage", "\u9996\u9875"], ["search", "\u641c\u7d22\u9875"], ["detail", "\u8be6\u60c5\u9875"], ["cart", "\u8d2d\u7269\u8f66"]],
      presets: [
        ["active", "\u6d3b\u8dc3\u7528\u6237"],
        ["price", "\u4ef7\u683c\u654f\u611f"],
        ["high", "\u9ad8\u4ef7\u503c"],
        ["new", "\u65b0\u7528\u6237"]
      ]
    };

    const defaults = {
      userId: "test_user_001",
      scene: "homepage",
      numItems: 3,
      recentViews: "\u624b\u673a, \u8033\u673a, \u5e73\u677f",
      recentPurchases: "\u5145\u7535\u5668",
      viewCount: 25,
      purchaseCount: 3,
      avgOrder: 299,
      activeHours: "20,21,22"
    };

    const presetData = {
      active: defaults,
      price: { ...defaults, recentViews: "\u6027\u4ef7\u6bd4\u624b\u673a, \u8033\u673a, \u5145\u7535\u5b9d", recentPurchases: "\u6570\u636e\u7ebf", viewCount: 40, purchaseCount: 1, avgOrder: 129, activeHours: "12,13,20" },
      high: { ...defaults, recentViews: "\u9ad8\u7aef\u8033\u673a, \u65d7\u8230\u624b\u673a, \u5e73\u677f", recentPurchases: "\u667a\u80fd\u624b\u8868", viewCount: 18, purchaseCount: 8, avgOrder: 1288, activeHours: "19,20,21" },
      new: { ...defaults, recentViews: "\u624b\u673a, \u5165\u95e8\u8033\u673a", recentPurchases: "", viewCount: 5, purchaseCount: 0, avgOrder: 0, activeHours: "10,11,12" }
    };

    const $ = (id) => document.getElementById(id);

    function initText() {
      document.title = cn.pageTitle;
      ["pageTitle","pageSubtitle","healthText","modelLabel","apiLabel","configTitle","configDesc","labelUser","labelScene","labelCount","labelViews","labelPurchases","labelViewCount","labelPurchaseCount","labelAvgOrder","labelHours","labelPresets","metricLatency","metricProducts","metricCopies","metricGroup","productsTitle","productsHint","copiesTitle","copiesHint","agentsTitle","agentsHint","logTitle","logHint"].forEach((id) => {
        if ($(id)) $(id).textContent = cn[id] || "";
      });
      $("runBtn").textContent = cn.run;
      $("resetBtn").textContent = cn.reset;
      cn.scenes.forEach(([value, text]) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        $("scene").appendChild(option);
      });
      cn.presets.forEach(([value, text]) => {
        const button = document.createElement("button");
        button.className = "preset";
        button.type = "button";
        button.dataset.preset = value;
        button.textContent = text;
        button.addEventListener("click", () => setForm(presetData[value]));
        $("presets").appendChild(button);
      });
    }

    function setForm(values) {
      $("userId").value = values.userId;
      $("scene").value = values.scene;
      $("numItems").value = values.numItems;
      $("recentViews").value = values.recentViews;
      $("recentPurchases").value = values.recentPurchases;
      $("viewCount").value = values.viewCount;
      $("purchaseCount").value = values.purchaseCount;
      $("avgOrder").value = values.avgOrder;
      $("activeHours").value = values.activeHours;
    }

    function parseList(value) {
      return value.split(/[,\n]/).map((item) => item.trim()).filter(Boolean);
    }

    function empty(id, text) {
      $(id).innerHTML = `<div class="empty">${text}</div>`;
    }

    function resetSummary() {
      $("latencyValue").textContent = "-";
      $("productCount").textContent = "-";
      $("copyCount").textContent = "-";
      $("groupValue").textContent = "-";
    }

    function renderProducts(products) {
      if (!products || !products.length) return empty("productsWrap", cn.noData);
      $("productsWrap").innerHTML = `<div class="cards">${products.map((item) => `
        <article class="card">
          <p class="card-title">${item.name || item.product_id}</p>
          <div class="meta">${cn.category}: ${item.category || "-"} | ${cn.brand}: ${item.brand || "-"}</div>
          <div class="meta">${cn.productId}: ${item.product_id}</div>
          <div class="price">¥${Number(item.price || 0).toFixed(0)}</div>
          <div class="meta">${cn.stock}: ${item.stock ?? "-"}</div>
          <div class="tag-row">${(item.tags || []).map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
        </article>`).join("")}</div>`;
    }

    function renderCopies(copies) {
      if (!copies || !copies.length) return empty("copiesWrap", cn.noData);
      $("copiesWrap").innerHTML = `<div class="cards">${copies.map((item) => `
        <article class="card">
          <p class="card-title">${cn.productId}: ${item.product_id || "-"}</p>
          <div class="meta">${item.copy || ""}</div>
        </article>`).join("")}</div>`;
    }

    function renderAgents(agentResults) {
      const entries = Object.entries(agentResults || {});
      if (!entries.length) return empty("agentsWrap", cn.noData);
      $("agentsWrap").innerHTML = entries.map(([name, result]) => `
        <article class="card">
          <div class="agent-top">
            <p class="card-title">${name}</p>
            <span class="status ${result.success ? "" : "fail"}">${result.success ? cn.success : cn.failed}</span>
          </div>
          <div class="meta">${cn.latency}${Number(result.latency_ms || 0).toFixed(1)} ms</div>
          <div class="meta">${cn.confidence}${Number(result.confidence || 0).toFixed(2)}</div>
          <div class="meta">${result.error ? cn.error + result.error : cn.normal}</div>
        </article>`).join("");
    }

    function buildPayload() {
      return {
        user_id: $("userId").value.trim() || defaults.userId,
        scene: $("scene").value,
        num_items: Number($("numItems").value || 3),
        context: {
          recent_views: parseList($("recentViews").value),
          recent_purchases: parseList($("recentPurchases").value),
          view_count_7d: Number($("viewCount").value || 0),
          purchase_count_30d: Number($("purchaseCount").value || 0),
          avg_order_amount: Number($("avgOrder").value || 0),
          active_hours: parseList($("activeHours").value).map(Number).filter((item) => !Number.isNaN(item))
        }
      };
    }

    async function loadHealth() {
      try {
        const response = await fetch("/health");
        const data = await response.json();
        $("healthText").textContent = data.status === "healthy" ? cn.serviceOnline : cn.serviceOffline;
        $("modelText").textContent = data.model || "-";
      } catch {
        $("healthText").textContent = cn.serviceOffline;
      }
    }

    async function runRecommendation() {
      $("runBtn").disabled = true;
      $("runBtn").textContent = cn.running;
      $("logBox").textContent = cn.running;
      try {
        const response = await fetch("/api/v1/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildPayload())
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || data.error || cn.requestFailed);
        $("latencyValue").textContent = Math.round(data.total_latency_ms || 0);
        $("productCount").textContent = (data.products || []).length;
        $("copyCount").textContent = (data.marketing_copies || []).length;
        $("groupValue").textContent = data.experiment_group || "-";
        renderProducts(data.products);
        renderCopies(data.marketing_copies);
        renderAgents(data.agent_results);
        $("logBox").textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resetSummary();
        empty("productsWrap", cn.requestFailed);
        empty("copiesWrap", cn.requestFailed);
        empty("agentsWrap", cn.requestFailed);
        $("logBox").textContent = String(error.message || error);
      } finally {
        $("runBtn").disabled = false;
        $("runBtn").textContent = cn.run;
      }
    }

    initText();
    setForm(defaults);
    empty("productsWrap", cn.emptyProducts);
    empty("copiesWrap", cn.emptyCopies);
    empty("agentsWrap", cn.emptyAgents);
    $("logBox").textContent = cn.emptyLog;
    $("runBtn").addEventListener("click", runRecommendation);
    $("resetBtn").addEventListener("click", () => setForm(defaults));
    loadHealth();
  </script>
</body>
</html>
